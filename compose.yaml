name: prompt-injection-shield

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: prompt-injection-shield-service:local
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod,json-logs
      APP_SECURITY_ENABLED: "true"
      APP_RATE_LIMIT_BACKEND: redis
      APP_AUDIT_FINGERPRINT_KEY: ${APP_AUDIT_FINGERPRINT_KEY:-local-development-audit-key-change-me}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-promptshield}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-promptshield}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-promptshield-dev-password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
      # The issuer is public so host-minted demo tokens and JWT iss validation agree.
      # Key retrieval remains inside the Compose network.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:${KEYCLOAK_PORT:-8081}/realms/promptshield
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/promptshield/protocol/openid-connect/certs
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      SERVER_SHUTDOWN: graceful
      SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: 20s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 768m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "--max-time", "3", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - shield

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-promptshield}
      POSTGRES_USER: ${POSTGRES_USER:-promptshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-promptshield-dev-password}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak-dev-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-create-keycloak-database.sh:/docker-entrypoint-initdb.d/01-create-keycloak-database.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready --username=$$POSTGRES_USER --dbname=$$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    shm_size: 256mb
    security_opt:
      - no-new-privileges:true
    networks:
      - shield

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-dev-password}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - shield

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.4
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_HOSTNAME: http://localhost:${KEYCLOAK_PORT:-8081}
      KC_HOSTNAME_STRICT: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin-change-me}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak-dev-password}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8081}:8080"
    volumes:
      - ./docker/keycloak/import:/opt/keycloak/data/import:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000;
          printf "GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n" >&3;
          grep -q "200" <&3'
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 10
    networks:
      - shield

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    security_opt:
      - no-new-privileges:true
    networks:
      - shield

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    security_opt:
      - no-new-privileges:true
    networks:
      - shield

networks:
  shield:
    name: prompt-injection-shield-network

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
