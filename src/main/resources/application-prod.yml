spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          # The issuer validates token identity; the JWK endpoint can remain
          # internal to the deployment network.
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI}
          audiences:
            - promptshield-api

app:
  audit:
    fingerprint-key: ${APP_AUDIT_FINGERPRINT_KEY}
  security:
    enabled: true
  rate-limit:
    backend: redis
