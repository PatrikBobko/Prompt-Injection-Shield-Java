spring:
  application:
    name: prompt-injection-shield-service
  jackson:
    # Keep the JSON report tidy: omit null offsets, decoded payloads, etc.
    default-property-inclusion: non_null

server:
  port: 8080
  # Cap request body size: the scanner accepts whole pages, but reject anything
  # unreasonable up front rather than parsing megabytes of hostile HTML.
  tomcat:
    max-http-form-post-size: 4MB
    max-swallow-size: 4MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${APP_TRACE_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    com.promptshield: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{correlationId}] %logger{36} - %msg%n"
