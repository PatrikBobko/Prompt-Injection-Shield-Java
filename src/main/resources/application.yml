spring:
  application:
    name: prompt-injection-shield-service
  jackson:
    # Keep the JSON report tidy: omit null offsets, decoded payloads, etc.
    default-property-inclusion: non_null

server:
  port: 8080
  # Cap request body size: the scanner accepts whole pages, but reject anything
  # unreasonable up front rather than parsing megabytes of hostile HTML.
  tomcat:
    max-http-form-post-size: 4MB
    max-swallow-size: 4MB

logging:
  level:
    com.promptshield: INFO
